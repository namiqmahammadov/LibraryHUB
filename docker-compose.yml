services:

  users-postgres:
    image: postgres:17
    container_name: users-postgres
    restart: always
    environment:
      POSTGRES_DB: ${USERS_DB_NAME}
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
    ports:
      - "${USERS_DB_HOST_PORT}:5432"
    volumes:
      - users-postgres-data:/var/lib/postgresql/data

  books-postgres:
    image: postgres:17
    container_name: books-postgres
    restart: always
    environment:
      POSTGRES_DB: ${BOOKS_DB_NAME}
      POSTGRES_USER: ${BOOKS_DB_USER}
      POSTGRES_PASSWORD: ${BOOKS_DB_PASSWORD}
    ports:
      - "${BOOKS_DB_HOST_PORT}:5432"
    volumes:
      - books-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT}:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_HOST_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"

  ms-user:
    image: ${MS_USER_IMAGE}
    container_name: ms-user
    restart: always
    depends_on:
      - users-postgres
      - redis
      - rabbitmq
    ports:
      - "${MS_USER_PORT}:8081"

  ms-book:
    image: ${MS_BOOK_IMAGE}
    container_name: ms-book
    restart: always
    depends_on:
      - books-postgres
      - redis
      - rabbitmq
      - ms-user
    ports:
      - "${MS_BOOK_PORT}:8082"

volumes:
  users-postgres-data:
  books-postgres-data: